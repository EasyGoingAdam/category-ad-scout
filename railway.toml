# Railway service config for Category Ad Scout.
# Railway's Nixpacks builder auto-detects Next.js; this file just pins
# the start command and adds a healthcheck. Set env vars in the Railway
# dashboard (Settings → Variables); the same names as .env.example apply.

[build]
builder = "NIXPACKS"
buildCommand = "npm run build"

[deploy]
startCommand = "npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30
